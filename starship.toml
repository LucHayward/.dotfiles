# Disable starting on a new line
add_newline = false

# cship sets `CSHIP_SESSION_ID` when invoking Starship; suppress the line
# break in the cship statusline while keeping it in normal terminals.
format = "$all${custom.maybe_line_break}$character"

[line_break]
disabled = true

[custom.maybe_line_break]
when = 'test -z "$CSHIP_SESSION_ID"'
command = 'echo ""'
format = """

"""

[directory]
fish_style_pwd_dir_length = 3
