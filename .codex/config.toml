model_provider = "amazon-bedrock"
forced_login_method = "api"
check_for_update_on_startup = false
commit_attribution = ""
chatgpt_base_url = "http://127.0.0.1:9"
approvals_reviewer = "auto_review"
model_reasoning_effort = "max"
model = "openai.gpt-5.6-sol"
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[sandbox_workspace_write]
network_access = true

[mcp_servers.builder-mcp]
args = [
    "--include-tools",
    "*",
    "--exclude-tools",
    "SkillsTool,WorkspaceSearch,Delegate,ToolReactivationTool",
]
command = "builder-mcp"

[mcp_servers.builder-mcp.env]
TOOL_PERSONALIZATION_ENABLED = "false"
TOOL_PERSONALIZATION_MIN_EXECUTIONS = "0"
TOOL_PERSONALIZATION_ROLLOUT_PERCENTAGE = "100"
TOOL_PERSONALIZATION_TRAINING_DAYS = "0"

[mcp_servers.builder-mcp.tools.CodeReviewReadActions]
approval_mode = "approve"

[shell_environment_policy]
inherit = "all"

[analytics]
enabled = true

[feedback]
enabled = false

[otel]
exporter = "none"
metrics_exporter = "none"
trace_exporter = "none"
log_user_prompt = true
environment = "stable"

[model_providers.amazon-bedrock.aws]
region = "us-east-2"

[marketplaces.aim]
source_type = "local"
source = "/Users/luchay/.aim/cc-plugins"

[plugins."AIPowerUserCapabilities-comms@aim"]
enabled = true

[plugins."AIPowerUserCapabilities-writing@aim"]
enabled = true

[plugins."AIPowerUserCapabilities-research@aim"]
enabled = true

[plugins."AIPowerUserCapabilities-core-dev@aim"]
enabled = true

[plugins."AIPowerUserCapabilities-code-review@aim"]
enabled = true

[plugins."AmazonBuilderCoreAIAgents-pipeline-assistant@aim"]
enabled = true

[plugins."AmazonBuilderCoreAIAgents-core@aim"]
enabled = true

[plugins."AtlasAICapabilities-all@aim"]
enabled = true

[plugins."ChorusAIM-all@aim"]
enabled = true

[plugins."EC2KiroMISExpert-all@aim"]
enabled = true

[plugins."MeshClawAICapabilities-all@aim"]
enabled = true

[plugins."MfArbalestAICapabilities-all@aim"]
enabled = true

[features]
memories = true

[notice]
hide_full_access_warning = true

# peon-ping Codex hooks begin
# install_dir = $HOME/.claude/hooks/peon-ping
[[hooks.SessionStart]]
matcher = "startup|resume|clear"

[[hooks.SessionStart.hooks]]
type = "command"
command = "if [ -f $HOME/.claude/hooks/peon-ping/adapters/codex.sh ]; then CLAUDE_PEON_DIR=$HOME/.claude/hooks/peon-ping bash $HOME/.claude/hooks/peon-ping/adapters/codex.sh >/dev/null 2>&1 || true; fi"
timeout = 30

[[hooks.UserPromptSubmit]]

[[hooks.UserPromptSubmit.hooks]]
